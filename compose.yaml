name: ${PROJECT}

services:
  portainer:
    image: "portainer/portainer-ce:2.33.7-alpine"
    user: "root:988"
    env_file: .env
    container_name: "portainer"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    networks:
      - net
    volumes:
      - "portainer_data:/data"
      - "/var/run/docker.sock:/var/run/docker.sock"

networks:
  net:
    name: cloudflare-net
    external: true

volumes:
  portainer_data:
